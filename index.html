<!DOCTYPE html>
<html lang="hu">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Szakácssegéd - Smart Kitchen App</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <header>
            <h1>🍳 Szakácssegéd</h1>
            <nav class="tabs">
                <button class="tab-link active" onclick="openTab(event, 'kamra-tab')">🏠 Kamra</button>
                <button class="tab-link" onclick="openTab(event, 'recept-tab')">📖 Receptek</button>
                <button class="tab-link" onclick="openTab(event, 'lista-tab')">🛒 Bevásárlólista</button>
            </nav>
        </header>

        <main>
            <section id="kamra-tab" class="tab-content active">
                <div class="card">
                    <h3>Készlet frissítése</h3>
                    <div class="input-row">
                        <select id="k-kategoria" onchange="frissitAlapanyagOpciok()">
                            <option value="">Kategória...</option>
                        </select>
                        <select id="k-nev-select" disabled>
                            <option value="">Alapanyag...</option>
                        </select>
                        <input type="number" id="k-menny" placeholder="Menny.">
                        <select id="k-egyseg">
                            <option value="g">g</option>
                            <option value="kg">kg</option>
                            <option value="ml">ml</option>
                            <option value="dl">dl</option>
                            <option value="l">l</option>
                            <option value="db">db</option>
                        </select>
                        <button onclick="hozzaadKamra()">Hozzáadás</button>
                    </div>
                </div>
                <div class="card">
                    <h3>Saját készletem</h3>
                    <ul id="kamraLista" class="item-list"></ul>
                </div>
            </section>

            <section id="recept-tab" class="tab-content">
                <div class="card">
                    <h3>Új recept hozzáadása</h3>
                    <input type="text" id="recept-nev" placeholder="Recept neve"
                        style="width: 100%; margin-bottom: 10px; padding: 10px; background: #2d2d2d; color: white; border: 1px solid #444; border-radius: 4px;">
                    <div class="input-row">
                        <select id="r-kategoria" onchange="frissitReceptAlapanyagOpciok()">
                            <option value="">Kategória...</option>
                        </select>
                        <select id="r-nev-select" disabled>
                            <option value="">Alapanyag...</option>
                        </select>
                        <input type="number" id="r-menny" placeholder="Menny.">
                        <select id="r-egyseg">
                            <option value="g">g</option>
                            <option value="kg">kg</option>
                            <option value="ml">ml</option>
                            <option value="dl">dl</option>
                            <option value="l">l</option>
                            <option value="db">db</option>
                        </select>
                        <button onclick="hozzaadIdeiglenesHozzavalo()">➕</button>
                    </div>
                    <div id="ideiglenesListaHelye" style="display:none; margin-top: 15px;">
                        <h4>Hozzávalók listája:</h4>
                        <ul id="ideiglenesLista" class="item-list"></ul>
                        <button onclick="receptMentese()"
                            style="width: 100%; background: #2ecc71; margin-top: 10px;">Recept mentése</button>
                    </div>
                </div>
                <h3>Mentett receptjeim</h3>
                <div id="receptLista" class="recept-grid"></div>
            </section>

            <section id="lista-tab" class="tab-content">
                <div class="card">
                    <h3>Kiválasztott menü (Heti terv)</h3>
                    <ul id="kivalasztottReceptek" class="item-list"></ul>
                    <button onclick="bevasarloListaGeneralas()" style="width: 100%; margin-top: 10px;">Bevásárlólista
                        generálása</button>
                    <button onclick="menuUritese()" class="delete-btn"
                        style="width: 100%; margin-top: 5px; background: #95a5a6;">Menü ürítése</button>
                </div>
                <div id="osszesitettListaCard" class="card" style="display:none;">
                    <h3>🛒 Összesített lista</h3>
                    <ul id="bevasarloLista" class="item-list"></ul>
                </div>
            </section>
        </main>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="script.js"></script>

    </script>
</body>

</html>
